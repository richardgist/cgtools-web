[Root:Survive]
Base=Survive
+Paths=AutoPatch
+Paths=Config
+Paths=Content
+Paths=Plugins
+Paths=Tools
+ExpandChildren=Content

[Root:UE4181]
Base=UE4181
+Paths=Engine
+Paths=Samples
+Paths=Templates

[P4Client]
; Format: +Mapping=<ProjectRootPrefix>|<P4Client>
; The longest matching prefix wins when multiple mappings cover a Project Root.
+Mapping=C:\CJGame\PRE418|jesephjiang_JESEPHJIAN_C_Pre418
+Mapping=E:\CJGame\trunk|jesephjiang_JESEPHJIAN-PCBU_E_Trunk
+Mapping=I:\CJGame\trunk|jesephjiang_I_Trunk

[SVN]
; Relative paths are resolved under the selected Project Root.
; Each path must be an SVN working copy root or a versioned checkout path.
+UpdatePath=Survive
+UpdatePath=UE4181\Engine\Source

[Exclude]
+ChildDirs=.git
+ChildDirs=.svn
+ChildDirs=Saved
+ChildDirs=Intermediate
+ChildDirs=Binaries
+ChildDirs=DerivedDataCache
+ChildDirs=Arts_Commerce
+ChildDirs=Platform
+ChildDirs=Delete
